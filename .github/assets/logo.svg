<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a0b3d"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7c5cff"/>
      <stop offset="50%" stop-color="#00e0ff"/>
      <stop offset="100%" stop-color="#ff5cb1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7c5cff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <circle cx="170"  cy="150" r="200" fill="url(#glow)"/>
  <circle cx="1050" cy="150" r="180" fill="url(#glow)" opacity=".6"/>

  <!-- Goat / chat-bubble emblem -->
  <g transform="translate(60,55)">
    <circle cx="100" cy="100" r="92" fill="#0e1530" stroke="url(#grad)" stroke-width="4"/>
    <!-- chat bubble body -->
    <path d="M40 80 C 40 50, 70 40, 100 40 C 145 40, 170 60, 170 95 C 170 125, 145 145, 110 145 L 95 165 L 90 145 C 60 142, 40 120, 40 95 Z"
          fill="url(#grad)"/>
    <!-- horns -->
    <path d="M70 50 C 60 20, 55 25, 65 50 Z" fill="#fff" opacity=".85"/>
    <path d="M130 50 C 140 20, 145 25, 135 50 Z" fill="#fff" opacity=".85"/>
    <!-- eyes -->
    <circle cx="84" cy="92" r="6" fill="#0b1020"/>
    <circle cx="124" cy="92" r="6" fill="#0b1020"/>
    <circle cx="86" cy="90" r="2" fill="#fff"/>
    <circle cx="126" cy="90" r="2" fill="#fff"/>
    <!-- smile -->
    <path d="M85 110 Q 104 124 123 110" stroke="#0b1020" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- sparkles -->
    <g fill="#ffd166">
      <circle cx="20" cy="20" r="3"/><circle cx="180" cy="30" r="2"/>
      <circle cx="190" cy="170" r="3"/><circle cx="10" cy="160" r="2"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(310,108)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" fill="url(#grad)">
    <text x="0"  y="0"  font-size="72" font-weight="900" letter-spacing="-2">GREATEST BOT</text>
    <text x="0"  y="68" font-size="56" font-weight="900" letter-spacing="-2" fill="#fff">OF ALL TIME · 2026</text>
  </g>

  <!-- author tag -->
  <g transform="translate(310,232)" font-family="Inter, ui-sans-serif, system-ui" fill="#9aa3c7" font-size="20" font-weight="600" letter-spacing="3">
    <text x="0" y="0">CRAFTED BY</text>
    <text x="148" y="0" fill="url(#grad)" font-weight="900" letter-spacing="2">REI</text>
    <text x="208" y="0">· MESSENGER · NODE 20</text>
  </g>

  <!-- bottom line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#grad)"/>
</svg>
